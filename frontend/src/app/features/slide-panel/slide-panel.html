<div
  class="fixed top-0 right-0 h-full w-80 bg-white shadow-lg transform transition-transform duration-300 z-50 flex flex-col"
  [class.translate-x-0]="showSlidePanel.isOpen()"
  [class.translate-x-full]="!showSlidePanel.isOpen()"
>
  <div
    (click)="showSlidePanel.toggle()"
    class="pr-4 pl-4 pt-4 flex flex-col cursor-pointer shrink-0"
  >
    <mat-icon class="transition-transform duration-300 hover:rotate-90 hover:text-red-500">
      close
    </mat-icon>
  </div>

  <div class="p-4 flex flex-col items-center overflow-y-auto flex-1 custom-scroll">
    @if (authService.isLoggedIn()) {
      <h2 class="text-xl font-semibold mb-4 text-center">
        {{ userStore.getUserName() || authService.user()?.displayName || 'Usuario' }}
      </h2>
    } @else {
      <h2 class="text-xl font-semibold mb-4 text-center">Account</h2>
    }

    <app-general-option class="w-full"></app-general-option>

    <app-customer-option class="w-full"></app-customer-option>
    <div class="my-4 border-t border-gray-200 w-full"></div>
    @if (userStore.userSyncData()?.data?.roleId === Role.ADMIN) {
      <app-admin-option class="w-full"></app-admin-option>
    }

    <div class="pb-10"></div>
  </div>
</div>

@if (showSlidePanel.isOpen()) {
  <div
    (click)="showSlidePanel.toggle()"
    class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 transition-opacity duration-300"
  ></div>
}
