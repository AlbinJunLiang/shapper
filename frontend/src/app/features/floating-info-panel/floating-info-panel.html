<div class="fixed bottom-5 right-5 z-50 flex flex-col items-center gap-4">
  <!-- Carrito con burbuja -->
  <div (click)="openCartDialog()" class="relative">
    <img
      src="car.svg"
      alt="{{ 'FLOATING.CART.ALT' | translate }}"
      class="w-10 h-10 transition-transform duration-300 hover:scale-110 select-none"
    />

    <!-- Burbuja corregida -->
    <span
      class="absolute top-0 right-0 translate-x-1/3 -translate-y-1/2 h-5 min-w-[20px] px-1.5 flex items-center justify-center text-xs font-bold text-white bg-red-600 rounded-full border-2 border-white shadow-md leading-none cursor-pointer select-none"
    >
      @if (cartStorage.totalUnits() > 0) {
        {{ cartStorage.totalUnits() }}
      } @else {
        0
      }
    </span>
  </div>

  <!-- Botón Filtro con etiqueta esquina -->
  <div (click)="dialogService.openFilterDialog()" class="relative">
    <img
      src="filter.svg"
      alt="{{ 'FLOATING.FILTER.ALT' | translate }}"
      class="w-10 h-10 drop-shadow-md transition-transform duration-300 hover:scale-110 select-none"
    />

    <!-- Etiqueta en esquina -->
    <span
      class="absolute top-0 right-0 translate-x-1/3 -translate-y-1/2 px-2 py-[2px] text-[10px] font-bold text-white bg-indigo-600 rounded-full border-2 border-white shadow-md leading-none cursor-pointer select-none antialiased tracking-wider transform-gpu"
    >
      {{ 'FLOATING.FILTER.LABEL' | translate }}
    </span>
  </div>
</div>
