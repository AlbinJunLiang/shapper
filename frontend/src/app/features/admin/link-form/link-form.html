<div class="w-[92%] max-w-[1100px] mx-auto py-4">
  <div class="mb-8">
    <h1 class="text-2xl font-semibold text-gray-800">Enlaces</h1>
    <p class="text-gray-500 mt-1">Ajuste de enlaces de redirecciones, redes sociales y otros.</p>
  </div>
  <div class="space-y-4">
    @for (link of links(); track link.id) {
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <div class="flex justify-between items-center mb-4">
          <label class="text-[12px] font-bold tracking-[0.15em] text-gray-800">
            {{ link.title }}
          </label>

          <div class="flex items-center gap-2">
            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-tighter"
              >Estado</span
            >
            <button
              type="button"
              (click)="processToggleStatus(link.id)"
              class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none cursor-pointer"
              [class.bg-green-500]="link.isActive"
              [class.bg-gray-200]="!link.isActive"
            >
              <span
                class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
                [class.translate-x-5]="link.isActive"
                [class.translate-x-1]="!link.isActive"
              ></span>
            </button>
          </div>
        </div>
        @if (urlInput.value && !isValidUrl(urlInput.value)) {
          <span class="text-[12px] text-red-500 mt-1"> Enlace no válido </span>
        }
        <div class="flex flex-col md:flex-row md:items-center gap-4">
          <input
            #urlInput
            type="text"
            [value]="link.url"
            (input)="(0)"
            [placeholder]="link.placeHolder"
            class="flex-1 bg-transparent py-2 text-base text-gray-900 focus:outline-none border-b border-gray-100 focus:border-black transition-all"
          />

          <div class="flex items-center gap-1">
            <button
              (click)="handleCancel(link, urlInput)"
              type="button"
              class="px-4 py-2 text-xs font-bold text-gray-400 hover:text-gray-600 transition"
            >
              Cancelar
            </button>
            <button
              (click)="processUpsert(link, urlInput.value)"
              type="button"
              class="cursor-pointer px-5 py-2 bg-black text-white text-xs font-bold rounded-lg hover:bg-gray-800 transition shadow-sm active:scale-95"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
