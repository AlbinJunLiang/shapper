<div class="flex flex-col items-center justify-center w-full p-2">
  <div class="w-full">
    <mat-form-field appearance="outline" class="w-full">
        <button matPrefix mat-icon-button (click)="clearSearch()" class="text-blue-500 ml-2">
          <mat-icon>close</mat-icon>
        </button>
      

      <input
        [formControl]="searchControl"
        type="text"
        matInput
        placeholder="Buscar productos, marcas y más..."
        (keyup.enter)="performSearch()"
        class="text-lg"
      />

      <button
        matSuffix
        mat-icon-button
        (click)="performSearch()"
        type="button"
        class="text-gray-300 group-hover:text-gray-500 transition-colors mr-2"
      >
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>
  </div>
</div>
